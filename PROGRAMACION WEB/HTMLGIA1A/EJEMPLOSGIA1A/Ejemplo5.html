<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agregando vínculos e imágenes</title>
</head>

<body>

    <h1>Ejemplo de vínculos e imágenes</h1>

    <!-- Vínculo -->
    <p>
        Visita nuestra página favorita:
        <a href="https://oregoom.com/html/base/#" target="_blank">
            Ir a Ejemplo.com
        </a>
    </p>

    <!-- Imagen -->
    <p>Esta es una imagen de ejemplo:</p>
    <img src="Imagenes/imagen 2.jpg" alt="Imagen de ejemplo" width="300">

    <!-- Combinación: Imagen como enlace -->
    <p>Haz click en la imagen para ir a la página:</p>
    <a href="https://todosobrefutas.com/frutas/" target="_blank">
        <img src="Imagenes/imagen 3.png" alt="Imagen enlazada" width="300">
    </a>

    <p>
        <abbr title="HyperText Markup Language">HTML</abbr> es un lenguaje de marcado.
    </p>

</body>

</html>
